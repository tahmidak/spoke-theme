<form id="cf-form" novalidate class="flex flex-col gap-5">

        <!-- Name row -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div class="flex flex-col gap-1.5">
            <label for="cf-fname" class="text-[11px] font-bold uppercase tracking-[0.8px]" style="color:#43474f">
              First Name <span style="color:#F4A726">*</span>
            </label>
            <input type="text" id="cf-fname" name="first_name" class="cf-input" placeholder="John" required
              autocomplete="given-name" />
          </div>
          <div class="flex flex-col gap-1.5">
            <label for="cf-lname" class="text-[11px] font-bold uppercase tracking-[0.8px]" style="color:#43474f">
              Last Name <span style="color:#F4A726">*</span>
            </label>
            <input type="text" id="cf-lname" name="last_name" class="cf-input" placeholder="Smith" required
              autocomplete="family-name" />
          </div>
        </div>

        <!-- Email -->
        <div class="flex flex-col gap-1.5">
          <label for="cf-email" class="text-[11px] font-bold uppercase tracking-[0.8px]" style="color:#43474f">
            Email Address <span style="color:#F4A726">*</span>
          </label>
          <input type="email" id="cf-email" name="email" class="cf-input" placeholder="john@example.co.uk" required
            autocomplete="email" />
        </div>

        <!-- Phone -->
        <div class="flex flex-col gap-1.5">
          <label for="cf-phone" class="text-[11px] font-bold uppercase tracking-[0.8px]" style="color:#43474f">
            Phone Number <span class="font-normal normal-case tracking-normal" style="color:#43474f">(optional)</span>
          </label>
          <input type="tel" id="cf-phone" name="phone" class="cf-input" placeholder="+44 7700 000000"
            autocomplete="tel" />
        </div>

        <!-- Subject -->
        <div class="flex flex-col gap-1.5">
          <label for="cf-subject" class="text-[11px] font-bold uppercase tracking-[0.8px]" style="color:#43474f">
            Enquiry Type <span style="color:#F4A726">*</span>
          </label>
          <div class="relative">
            <select id="cf-subject" name="subject" class="cf-select pr-10" required>
              <option value="" disabled selected>Please select…</option>
              <option value="course">Course Enquiry</option>
              <option value="accreditation">Accreditation Question</option>
              <option value="corporate">Corporate / Group Training</option>
              <option value="technical">Technical Support</option>
              <option value="billing">Billing &amp; Payments</option>
              <option value="other">Other</option>
            </select>
            <svg class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none w-4 h-4" style="color:#43474f"
              fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
            </svg>
          </div>
        </div>

        <!-- Message -->
        <div class="flex flex-col gap-1.5">
          <label for="cf-message" class="text-[11px] font-bold uppercase tracking-[0.8px]" style="color:#43474f">
            Message <span style="color:#F4A726">*</span>
          </label>
          <textarea id="cf-message" name="message" class="cf-textarea" rows="5" placeholder="Tell us how we can help…"
            required></textarea>
        </div>

        <!-- Consent -->
        <label class="flex items-start gap-3 cursor-pointer">
          <input type="checkbox" name="consent" required class="mt-0.5 w-4 h-4 rounded flex-shrink-0"
            style="accent-color:#1A3C6E" />
          <span class="text-[13px]" style="color:#43474f">
            I agree to StudyMate Central's
            <a href="/privacy-policy/" class="font-semibold underline" style="color:#1A3C6E">Privacy Policy</a>.
          </span>
        </label>

        <!-- Error -->
        <div class="hidden rounded-lg px-4 py-3 text-[13px] font-semibold" id="cf-error" role="alert"
          style="background:rgba(186,26,26,0.08);color:#BA1A1A">
          ❌ Please fill in all required fields and agree to the privacy policy.
        </div>

        <!-- Submit -->
        <button type="submit"
          class="w-full h-[52px] rounded-lg font-bold text-[17px] transition-all hover:brightness-105 hover:-translate-y-0.5"
          style="background:#F4A726;color:#6b4500">
          Send Message
        </button>

        <!-- Success -->
        <div class="hidden rounded-lg px-4 py-3 text-[13px] font-semibold" id="cf-success" role="alert"
          style="background:#E8F4EC;color:#1b5e20">
          ✅ Message sent! We'll be in touch within 2 business hours.
        </div>

      </form>
