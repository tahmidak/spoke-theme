<!-- wp:html -->
<header id="site-header" class="bg-primary sticky top-0 z-50">

  <!-- ── Main nav row ── -->
  <div class="max-w-site mx-auto px-6 lg:px-8 h-[72px] flex items-center justify-between gap-4">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-2 shrink-0 no-underline" aria-label="StudyMate Central – Home">
      <div class="w-8 h-8 bg-accent rounded-md flex items-center justify-center flex-shrink-0">
        <svg viewBox="0 0 24 24" class="w-5 h-5 text-accent-dark" fill="currentColor" aria-hidden="true">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <span class="text-white font-bold text-[18px] tracking-tight leading-none whitespace-nowrap">
        StudyMate <span class="text-accent">Central</span>
      </span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="hidden md:flex items-center gap-1" aria-label="Primary navigation">
      <a href="/courses/"
         class="text-white/75 hover:text-white text-[15px] font-medium px-4 py-2 rounded-lg hover:bg-white/10 transition-colors duration-200">
        Courses
      </a>
      <a href="/hot-deals/"
         class="text-white/75 hover:text-white text-[15px] font-medium px-4 py-2 rounded-lg hover:bg-white/10 transition-colors duration-200">
        Hot Deals
      </a>
      <a href="/about/"
         class="text-white/75 hover:text-white text-[15px] font-medium px-4 py-2 rounded-lg hover:bg-white/10 transition-colors duration-200">
        About
      </a>
      <a href="/contact/"
         class="text-white/75 hover:text-white text-[15px] font-medium px-4 py-2 rounded-lg hover:bg-white/10 transition-colors duration-200">
        Contact
      </a>
    </nav>

    <!-- Right: Auth + CTA -->
    <div class="hidden md:flex items-center gap-3 flex-shrink-0">
      <!-- My Dashboard — only visible when logged in (WP adds .logged-in to <body>) -->
      <a href="/dashboard/"
         class="spoke-dashboard-link text-white/75 hover:text-white text-[14px] font-medium border border-white/20
                px-3 py-1.5 rounded-lg hover:bg-white/10 transition duration-200 hidden whitespace-nowrap">
        My Dashboard
      </a>

      <a href="/login/"
         class="spoke-login-link text-white/75 hover:text-white text-[14px] font-medium transition-colors duration-200">
        Log in
      </a>

      <a href="/courses/"
         class="bg-accent text-accent-dark font-bold text-[14px] px-5 py-2 rounded-lg
                hover:brightness-105 transition duration-200 whitespace-nowrap shadow-sm">
        Browse Courses
      </a>
    </div>

    <!-- Mobile Hamburger -->
    <button id="spoke-ham-btn"
            class="md:hidden text-white p-2 rounded-lg hover:bg-white/10 transition duration-200 flex-shrink-0"
            aria-label="Open navigation menu"
            aria-expanded="false"
            aria-controls="spoke-mobile-menu">
      <svg id="spoke-ham-open" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
      <svg id="spoke-ham-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>

  </div>

  <!-- Mobile Drawer -->
  <div id="spoke-mobile-menu"
       class="hidden md:hidden bg-primary border-t border-white/10"
       aria-label="Mobile navigation">
    <nav class="max-w-site mx-auto px-6 pb-5 flex flex-col gap-1 pt-3">

      <a href="/courses/"
         class="text-white/80 hover:text-white text-[15px] font-medium py-2.5 px-3 rounded-lg hover:bg-white/8 transition-colors">
        Courses
      </a>
      <a href="/hot-deals/"
         class="text-white/80 hover:text-white text-[15px] font-medium py-2.5 px-3 rounded-lg hover:bg-white/8 transition-colors">
        Hot Deals
      </a>
      <a href="/about/"
         class="text-white/80 hover:text-white text-[15px] font-medium py-2.5 px-3 rounded-lg hover:bg-white/8 transition-colors">
        About
      </a>
      <a href="/contact/"
         class="text-white/80 hover:text-white text-[15px] font-medium py-2.5 px-3 rounded-lg hover:bg-white/8 transition-colors">
        Contact
      </a>

      <div class="border-t border-white/10 mt-2 pt-4 flex gap-3">
        <a href="/login/"
           class="border border-white/30 text-white text-[14px] font-bold px-4 py-2.5 rounded-lg hover:bg-white/10 transition flex-1 text-center">
          Log in
        </a>
        <a href="/courses/"
           class="bg-accent text-accent-dark font-bold text-[14px] px-4 py-2.5 rounded-lg hover:brightness-105 transition flex-1 text-center">
          Browse Courses
        </a>
      </div>

    </nav>
  </div>

</header>

<script>
(function () {
  'use strict';

  var header    = document.getElementById('site-header');
  var btn       = document.getElementById('spoke-ham-btn');
  var menu      = document.getElementById('spoke-mobile-menu');
  var icOpen    = document.getElementById('spoke-ham-open');
  var icClose   = document.getElementById('spoke-ham-close');
  var dashLink  = document.querySelector('.spoke-dashboard-link');
  var loginLink = document.querySelector('.spoke-login-link');
  var isOpen    = false;

  if (!btn || !header) return;

  // ── Mobile drawer toggle ──────────────────────────────────────
  btn.addEventListener('click', function () {
    isOpen = !isOpen;
    menu.classList.toggle('hidden', !isOpen);
    icOpen.classList.toggle('hidden', isOpen);
    icClose.classList.toggle('hidden', !isOpen);
    btn.setAttribute('aria-expanded', String(isOpen));
  });

  // Close drawer on resize to desktop
  window.addEventListener('resize', function () {
    if (window.innerWidth >= 768 && isOpen) {
      isOpen = false;
      menu.classList.add('hidden');
      icOpen.classList.remove('hidden');
      icClose.classList.add('hidden');
      btn.setAttribute('aria-expanded', 'false');
    }
  }, { passive: true });

  // ── Scroll shadow ─────────────────────────────────────────────
  function onScroll() {
    if (window.scrollY > 8) {
      header.classList.add('shadow-nav');
    } else {
      header.classList.remove('shadow-nav');
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true });

  // ── Logged-in state ───────────────────────────────────────────
  // WordPress adds .logged-in to <body> — show/hide nav links accordingly.
  if (document.body.classList.contains('logged-in')) {
    if (dashLink)  dashLink.classList.remove('hidden');
    if (loginLink) loginLink.style.display = 'none';
  }

})();
</script>
<!-- /wp:html -->
