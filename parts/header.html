<!-- HEADER STYLES ───────────────────────────────────────────────
     Scoped header CSS. Handles sticky shadow, active nav state,
     mobile hamburger, and the logged-in dashboard link toggle.
     ──────────────────────────────────────────────────────────── -->
<!-- wp:html -->
<style>
/* ── Shell ── */
.site-header {
	position:   sticky;
	top:        0;
	z-index:    50;
	background: var(--wp--preset--color--white);
	transition: box-shadow 200ms ease;
}

/* Shadow added by header-scroll.js when user scrolls > 8px */
.site-header.is-scrolled {
	box-shadow: 0 2px 12px rgba(26,60,110,0.08);
}

/* ── Inner row: fixed height, no vertical padding ── */
.site-header__inner {
	height:          72px;
	display:         flex;
	align-items:     center;
	justify-content: space-between;
	gap:             var(--wp--preset--spacing--4);
}

/* ── Logo ── */
.site-header__logo a {
	font-size:       1.25rem !important;
	font-weight:     700 !important;
	letter-spacing:  -0.02em !important;
	color:           var(--wp--preset--color--primary) !important;
	text-decoration: none !important;
	white-space:     nowrap;
}
.site-header__logo a:hover {
	color: var(--wp--preset--color--accent) !important;
}

/* ── Desktop navigation ── */
.site-header__nav {
	display: flex;
	align-items: center;
	gap: var(--wp--preset--spacing--4);
}
.site-header__nav .wp-block-navigation__container {
	display:     flex !important;
	align-items: center;
	gap:         var(--wp--preset--spacing--4);
}
.site-header__nav a.wp-block-navigation-item__content {
	color:           var(--wp--preset--color--on-surface-variant) !important;
	font-size:       var(--wp--preset--font-size--body);
	font-weight:     500;
	text-decoration: none;
	padding:         4px 0;
	border-bottom:   2px solid transparent;
	transition:      color 200ms ease, border-color 200ms ease;
}
.site-header__nav a.wp-block-navigation-item__content:hover {
	color:        var(--wp--preset--color--primary) !important;
	border-color: var(--wp--preset--color--accent);
}
/* Active page link */
.site-header__nav .current-menu-item > a.wp-block-navigation-item__content {
	color:        var(--wp--preset--color--primary) !important;
	border-color: var(--wp--preset--color--accent);
	font-weight:  700;
}

/* ── Actions area ── */
.site-header__actions {
	display:     flex;
	align-items: center;
	gap:         var(--wp--preset--spacing--2);
	flex-shrink: 0;
}

/* ── My Dashboard link — only show when .logged-in body class present ── */
.site-header__dashboard-link {
	display:         none;
	align-items:     center;
	font-size:       var(--wp--preset--font-size--small);
	font-weight:     600;
	color:           var(--wp--preset--color--primary);
	text-decoration: none;
	padding:         6px var(--wp--preset--spacing--2);
	border:          1px solid rgba(26,60,110,0.15);
	border-radius:   8px;
	transition:      background 200ms ease, border-color 200ms ease;
	white-space:     nowrap;
}
.site-header__dashboard-link:hover {
	background:   var(--wp--preset--color--light);
	border-color: var(--wp--preset--color--primary);
}
/* Show only when WordPress has added .logged-in to <body> */
body.logged-in .site-header__dashboard-link {
	display: flex;
}

/* ── CTA button ── */
.site-header__cta .wp-block-button__link {
	font-size:   var(--wp--preset--font-size--body) !important;
	font-weight: 700 !important;
	white-space: nowrap;
}

/* ── Mobile hamburger / overlay nav ──
   WordPress Navigation block adds .wp-block-navigation__responsive-container
   and .wp-block-navigation__responsive-container-open button automatically. ── */
@media (max-width: 781px) {
	.site-header__nav .wp-block-navigation__container {
		display: none !important; /* WP block handles this via its own overlay */
	}
	.site-header__dashboard-link {
		display: none !important; /* too cramped on mobile */
	}
}

/* ── Mobile overlay panel styling ── */
.wp-block-navigation__responsive-container.is-menu-open {
	background: var(--wp--preset--color--primary) !important;
	padding:    var(--wp--preset--spacing--6) var(--wp--preset--spacing--4);
}
.wp-block-navigation__responsive-container.is-menu-open .wp-block-navigation-item__content {
	color:       rgba(255,255,255,0.9) !important;
	font-size:   var(--wp--preset--font-size--h3) !important;
	font-weight: 500 !important;
}
.wp-block-navigation__responsive-container.is-menu-open .wp-block-navigation-item__content:hover {
	color: var(--wp--preset--color--accent) !important;
}
/* Close button */
.wp-block-navigation__responsive-container-close {
	color: var(--wp--preset--color--white) !important;
}
/* Hamburger icon */
.wp-block-navigation__responsive-container-open {
	color: var(--wp--preset--color--primary) !important;
}
</style>
<!-- /wp:html -->
