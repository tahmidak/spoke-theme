<script>
(function () {
  'use strict';
  var input = document.getElementById('nf-search');
  var btn   = document.getElementById('nf-search-btn');
  function doSearch() {
    var q = input ? input.value.trim() : '';
    if (q) window.location.href = '/?s=' + encodeURIComponent(q);
  }
  if (btn)   btn.addEventListener('click', doSearch);
  if (input) input.addEventListener('keydown', function (e) { if (e.key === 'Enter') doSearch(); });
})();
</script>
